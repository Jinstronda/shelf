<svg width="44" height="36" viewBox="0 0 44 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 4 book spines, bottom-aligned, varying heights -->
  <!-- Book 1: leftmost, shortest -->
  <rect x="0" y="14" width="8" height="22" rx="1" fill="#C4603A"/>
  <rect x="0" y="14" width="8" height="2.5" rx="0" fill="#9E4D2E"/>
  <rect x="0" y="33.5" width="8" height="2.5" rx="0" fill="#9E4D2E"/>

  <!-- Book 2: medium -->
  <rect x="10" y="7" width="8" height="29" rx="1" fill="#C4603A"/>
  <rect x="10" y="7" width="8" height="2.5" rx="0" fill="#9E4D2E"/>
  <rect x="10" y="33.5" width="8" height="2.5" rx="0" fill="#9E4D2E"/>

  <!-- Book 3: tallest, center -->
  <rect x="20" y="1" width="8" height="35" rx="1" fill="#C4603A"/>
  <rect x="20" y="1" width="8" height="2.5" rx="0" fill="#9E4D2E"/>
  <rect x="20" y="33.5" width="8" height="2.5" rx="0" fill="#9E4D2E"/>

  <!-- Book 4: second from right, medium-short -->
  <rect x="30" y="10" width="8" height="26" rx="1" fill="#C4603A"/>
  <rect x="30" y="10" width="8" height="2.5" rx="0" fill="#9E4D2E"/>
  <rect x="30" y="33.5" width="8" height="2.5" rx="0" fill="#9E4D2E"/>

  <!-- Shelf baseline -->
  <rect x="0" y="35.5" width="38" height="0.5" rx="0" fill="#7A4020" opacity="0.6"/>
</svg>
